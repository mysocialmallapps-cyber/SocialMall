name: Sync verified product feed

on:
  workflow_dispatch:
  schedule:
    - cron: "15 3 * * *"

permissions:
  contents: write

jobs:
  sync:
    name: Import verified Awin or Impact products
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        working-directory: app
        run: npm ci

      - name: Import product feed
        working-directory: app
        env:
          PRODUCT_FEED_URL: ${{ secrets.PRODUCT_FEED_URL }}
          PRODUCT_FEED_NETWORK: ${{ vars.PRODUCT_FEED_NETWORK || 'awin' }}
          PRODUCT_FEED_LIMIT: ${{ vars.PRODUCT_FEED_LIMIT || '500' }}
          PRODUCT_FEED_MINIMUM: ${{ vars.PRODUCT_FEED_MINIMUM || '100' }}
          PRODUCT_FEED_CURRENCY: ${{ vars.PRODUCT_FEED_CURRENCY || 'EUR' }}
          PRODUCT_FEED_RETAILER: ${{ vars.PRODUCT_FEED_RETAILER }}
        run: npm run import:feed

      - name: Validate application
        working-directory: app
        run: |
          npm run lint
          npm run build

      - name: Commit synced feed
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/lib/products/data/verified-products.generated.ts
          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No feed changes to commit."
          else
            git commit -m "Sync verified product feed"
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Push synced feed
        if: steps.commit.outputs.changed == 'true'
        run: git push
